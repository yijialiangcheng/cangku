<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Desktop Clone Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#1F2229',
                        cardDark: '#2D3037',
                        btnBlue: '#2374ED',
                        textMain: '#EAEAEA',
                        textSub: '#A9ADB4',
                        linkBlue: '#58A6FF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .dashed-box {
                border: 1px dashed #ccc;
            }
        }
    </style>
</head>
<body class="bg-bgDark min-h-screen p-10 text-textMain font-sans">
    <!-- 顶部标题 -->
    <div class="mb-8">
        <h1 class="text-[3.5rem] font-light text-textMain mb-2">Let's get started!</h1>
        <p class="text-textSub text-lg">Add a repository to GitHub Desktop to start collaborating</p>
    </div>

    <!-- 搜索栏 -->
    <div class="flex items-center gap-3 mb-8 max-w-2xl">
        <div class="relative flex-1">
            <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-textSub"></i>
            <input type="text" placeholder="Filter your repositories"
                   class="w-full bg-cardDark pl-10 pr-4 py-2 rounded border-none outline-none text-textMain">
        </div>
        <button class="w-10 h-10 bg-cardDark rounded flex items-center justify-center hover:bg-[#383C44]">
            <i class="fa fa-refresh text-textSub"></i>
        </button>
    </div>

    <!-- 左右主内容容器 -->
    <div class="flex gap-10">
        <!-- 左侧提示区域 -->
        <div class="flex-1">
            <p class="text-textSub">Looks like there are no repositories for <span class="text-textMain">yijialiangcheng</span> on GitHub.</p>
            <a href="#" class="text-linkBlue hover:underline">Refresh this list</a>
            <span class="text-textSub"> if you've created a repository recently.</span>
        </div>

        <!-- 右侧按钮列表 -->
        <div class="w-[520px] flex flex-col gap-4">
            <!-- 第一个蓝色高亮按钮 -->
            <button class="bg-btnBlue w-full py-4 px-5 rounded flex items-center gap-4 text-white text-left text-lg hover:opacity-95">
                <i class="fa fa-graduation-cap text-xl"></i>
                Create a tutorial repository...
            </button>
            <!-- 普通按钮 -->
            <button class="bg-cardDark w-full py-4 px-5 rounded flex items-center gap-4 text-textMain text-left text-lg hover:bg-[#383C44] border border-gray-600">
                <i class="fa fa-clone text-xl text-textSub"></i>
                Clone a repository from the Internet...
            </button>
            <button class="bg-cardDark w-full py-4 px-5 rounded flex items-center gap-4 text-textMain text-left text-lg hover:bg-[#383C44] border border-gray-600">
                <i class="fa fa-plus text-xl text-textSub"></i>
                Create a New Repository on your local drive...
            </button>
            <button class="bg-cardDark w-full py-4 px-5 rounded flex items-center gap-4 text-textMain text-left text-lg hover:bg-[#383C44] border border-gray-600">
                <i class="fa fa-folder-open text-xl text-textSub"></i>
                Add an Existing Repository from your local drive...
            </button>
        </div>
    </div>

    <!-- 底部虚线提示框 -->
    <div class="mt-12 w-[620px] dashed-box rounded p-5 text-textSub flex items-start gap-3">
        <i class="fa fa-lightbulb-o mt-1"></i>
        <div>
            <span class="font-semibold text-textMain">ProTip!</span> You can drag & drop an existing repository folder here to add it to Desktop
        </div>
    </div>
</body>
</html>
