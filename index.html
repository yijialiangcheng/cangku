<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的个人博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#1F2229',
                        cardDark: '#2D3037',
                        btnBlue: '#2374ED',
                        textMain: '#EAEAEA',
                        textSub: '#A9ADB4',
                        linkBlue: '#58A6FF'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark min-h-screen text-textMain">
    <div class="max-w-4xl mx-auto px-6 py-16">
        <!-- 欢迎区 -->
        <header class="mb-16">
            <h1 class="text-5xl font-light mb-4">你好，欢迎来到我的博客</h1>
            <p class="text-textSub text-xl">这里记录我的学习、生活与项目分享</p>
        </header>

        <!-- 博客文章列表 -->
        <section class="mb-16">
            <h2 class="text-2xl font-semibold mb-6">最新文章</h2>
            <div class="space-y-4">
                <!-- 文章卡片，以后新增文章就复制这一块 -->
                <a href="posts/my-first-blog.html" class="block p-5 bg-cardDark rounded-lg hover:bg-[#383C44] transition">
                    <h3 class="text-xl font-medium mb-2">我的第一篇博客</h3>
                    <p class="text-textSub">2026年7月4日 · 随笔</p>
                </a>
            </div>
        </section>

        <!-- 作品展示 -->
        <section>
            <h2 class="text-2xl font-semibold mb-6">我的项目</h2>
            <div class="space-y-4">
                <a href="projects/github-desktop-clone.html" class="block p-5 bg-cardDark rounded-lg hover:bg-[#383C44] transition">
                    <h3 class="text-xl font-medium mb-2">GitHub Desktop 界面复刻</h3>
                    <p class="text-textSub">纯HTML+Tailwind实现的客户端界面还原</p>
                </a>
            </div>
        </section>
    </div>
</body>
</html>
